<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" stroke="rgb(0, 60, 116)" stroke-width="4"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(0, 60, 116);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(0, 40, 80);stop-opacity:1" />
    </linearGradient>
    
    <!-- Card shadow -->
    <filter id="cardShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000040"/>
    </filter>
  </defs>
  
  <!-- Main card (back) -->
  <rect x="50" y="70" width="50" height="70" rx="8" fill="#1f2937" filter="url(#cardShadow)" transform="rotate(-10 75 105)"/>
  
  <!-- Secondary card (middle) -->
  <rect x="65" y="65" width="50" height="70" rx="8" fill="#374151" filter="url(#cardShadow)" transform="rotate(-5 90 100)"/>
  
  <!-- Front card -->
  <rect x="80" y="60" width="50" height="70" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" filter="url(#cardShadow)"/>
  
  <!-- Card details on front card -->
  <rect x="85" y="67" width="20" height="3" rx="1.5" fill="#6b7280"/>
  <rect x="85" y="73" width="35" height="2" rx="1" fill="#9ca3af"/>
  <rect x="85" y="78" width="30" height="2" rx="1" fill="#9ca3af"/>
  
  <!-- Dollar sign in center -->
  <text x="105" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#059669" text-anchor="middle">$</text>
  
  <!-- Card value/price -->
  <rect x="85" y="105" width="25" height="8" rx="2" fill="#10b981"/>
  <text x="97.5" y="111" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">VALUE</text>
  
  <!-- Tracking/chart icon -->
  <g transform="translate(105, 145)">
    <circle cx="0" cy="0" r="25" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
    
    <!-- Mini chart line -->
    <polyline points="-15,5 -8,-2 -1,3 6,-8 13,-3" 
              fill="none" 
              stroke="#059669" 
              stroke-width="3" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    
    <!-- Chart dots -->
    <circle cx="-15" cy="5" r="2" fill="#059669"/>
    <circle cx="-8" cy="-2" r="2" fill="#059669"/>
    <circle cx="-1" cy="3" r="2" fill="#059669"/>
    <circle cx="6" cy="-8" r="2" fill="#059669"/>
    <circle cx="13" cy="-3" r="2" fill="#059669"/>
  </g>
</svg>